name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd web && npm install

      - name: Build frontend
        run: npm run build:web

      - name: Resolve repository version
        id: repository_version
        run: node scripts/fetch-github-version.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_VERSION_OWNER: qwc-ch
          GITHUB_VERSION_REPO: memos-on-cloudflare

      - name: Deploy Worker
        run: npx wrangler deploy --keep-vars --var "APP_VERSION:${{ steps.repository_version.outputs.version }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
